method:
  template_program_path: "path/to/template.py"
  task_description_path: "path/to/task_description.txt"
  language: "python"
  num_samplers: auto
  num_evaluators: auto
  examples_per_prompt: 2
  samples_per_prompt: 4
  max_samples: 1000
  inter_island_selection_p: 0.5
  llm_max_tokens: 1024
  llm_timeout_seconds: 120
  db_save_frequency: 100
  # Database configuration (nested under database_config)
  database_config:
    algo_sim_calculator:
      class_path: "algodisco.methods.algobleu_search.similarity_calculator.AlgoSimCalculator"
      kwargs: {}
    # Island specifications
    n_islands: 10
    island_capacity: 100
    # Selection parameters
    selection_exploitation_intensity: 1.0
    # Registration acceleration parameters
    num_sim_caculator_workers: 1
    async_register: true
    # Multi-objective selection and survival
    island_selection_mechanism: "single_obj"
    island_survival_mechanism: "single_obj"
    multi_obj_survival_topk: 1
    multi_obj_score_rank_weight: 0.5
    # Similarity calculation weights
    ast_dfg_weight: 1.0
    embedding_weight: 1.0
    behavioral_weight: 1.0
  keep_metadata_keys: ["sample_time", "eval_time", "execution_time", "error_msg", "idea_time", "emb_time", "prompt", "response_text"]
  debug_mode: false
  debug_mode_crash: false

llm:
  class_path: "algodisco.providers.llm.openai_api.OpenAIAPI"
  kwargs:
    model: "gpt-3.5-turbo"
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"

emb_llm:
  class_path: "algodisco.providers.llm.openai_api.OpenAIAPI"
  kwargs:
    model: "text-embedding-3-small"
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"

evaluator:
  class_path: "path/to/evaluator.py:YourEvaluator"
  kwargs: {}

logger:
  class_path: "algodisco.providers.logger.swanlab_logger.BaseSwanLabLogger"
  kwargs:
    logdir: "logs/algobleu_log"
    project: "your-swanlab-project"
    experiment_name: "algobleu_search-run"
    group: "algobleu_search"
    swanlab_logdir: "logs/algobleu_log/swanlab"
    api_key: null
