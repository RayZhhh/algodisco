method:
  template_program_path: "path/to/template.py"
  task_description_path: "path/to/task_description.txt"
  language: "python"
  num_samplers: 4
  num_evaluators: 4
  examples_per_prompt: 2
  samples_per_prompt: 4
  max_samples: 1000
  inter_island_selection_p: 0.5
  llm_max_tokens: 1024
  llm_timeout_seconds: 120
  db_save_frequency: 100
  # Database configuration (nested under database_config)
  database_config:
    # Island specifications
    n_islands: 10
    island_capacity: 100
    # Selection parameters
    selection_exploitation_intensity: 1.0
    # Similarity calculation weights
    ast_dfg_weight: 1.0
    embedding_weight: 1.0
    behavioral_weight: 1.0
  keep_metadata_keys: ["sample_time", "eval_time", "execution_time", "error_msg", "idea_time", "emb_time", "prompt", "response_text"]
  debug_mode: false
  debug_mode_crash: false

llm:
  class_path: "algodisco.providers.llm.openai_api.OpenAIAPI"
  kwargs:
    model: "gpt-3.5-turbo"
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"

emb_llm:
  class_path: "algodisco.providers.llm.openai_api.OpenAIAPI"
  kwargs:
    model: "text-embedding-3-small"
    api_key: "your-api-key"
    base_url: "https://api.openai.com/v1"

evaluator:
  class_path: "your_evaluator_module.YourEvaluator"
  kwargs: {}

logger:
  class_path: "algodisco.providers.logger.pickle_logger.BasePickleLogger"
  kwargs:
    logdir: "logs/algobleu_log"
