# EoH (Evolution of Hardware) Config for Online Bin Packing

method:
  template_program_path: "examples/online_bin_packing/template_algo.txt"
  task_description_path: "examples/online_bin_packing/task_description.txt"
  language: "python"
  pop_size: 5
  selection_num: 2
  use_e2_operator: true
  use_m1_operator: true
  use_m2_operator: true
  num_samplers: 2
  num_evaluators: 2
  max_samples: 100
  llm_max_tokens: 1024
  llm_timeout_seconds: 120
  db_save_frequency: 50
  init_samples_ratio: 2.0
  keep_metadata_keys: ["idea", "sample_time", "eval_time", "execution_time", "error_msg", "prompt", "response_text"]
  debug_mode: false
  debug_mode_crash: false

llm:
  class_path: "algodisco.providers.llm.openai_api.OpenAIAPI"
  kwargs:
    model: "gpt-4o-mini"
    # TODO: Replace with your API key, or set OPENAI_API_KEY environment variable
    api_key: null
    base_url: "https://api.openai.com/v1"

evaluator:
  class_path: "examples.online_bin_packing.evaluator.OnlineBinPackingEvaluator"
  kwargs: {}

logger:
  class_path: "algodisco.providers.logger.pickle_logger.BasePickleLogger"
  kwargs:
    logdir: "logs/online_bin_packing_eoh"
